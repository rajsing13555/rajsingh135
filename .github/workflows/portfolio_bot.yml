name: Portfolio AI Bot

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"
    - cron: "30 6 * * *"
    - cron: "30 13 * * *"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Run Bot
      run: python portfolio_bot.py

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Auto generated project" || echo "No changes"
        git push
